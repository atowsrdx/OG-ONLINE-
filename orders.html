<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>OG ONLINE — My Orders</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[var(--bg)] text-[var(--text)] min-h-screen">

  <header class="sticky top-0 z-50 nav-glass px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="icon-btn text-xl">←</a>
      <span class="logo-text text-base">My Orders</span>
    </div>
    <button id="themeToggle" class="icon-btn" title="Toggle theme">🌙</button>
  </header>

  <main class="px-3 pt-4 pb-20">
    <div id="myOrdersList" class="space-y-4"></div>
    <div id="emptyOrders" class="hidden text-center py-24 opacity-40">
      <p class="text-5xl mb-3">🛍️</p>
      <p class="font-semibold mb-1">No orders yet</p>
      <a href="index.html" class="text-sm underline opacity-60">Start shopping</a>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderMyOrders();
    });
  </script>
</body>
</html>
