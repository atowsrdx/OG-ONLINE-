<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>OG ONLINE — My Orders</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[var(--bg)] text-[var(--text)] min-h-screen">

  <!-- TOP NAV -->
  <header class="sticky top-0 z-50 nav-glass px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <a href="index.html" class="icon-btn text-xl">←</a>
      <span class="logo-text" style="font-size:1rem">My Orders</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="themeToggle" class="icon-btn">🌙</button>
      <button onclick="renderMyOrders()" class="icon-btn text-sm">🔄</button>
    </div>
  </header>

  <!-- UPI NOTICE -->
  <div class="mx-3 mt-3 mb-1 flex items-center gap-2 px-3 py-2 rounded-xl"
       style="background:rgba(0,214,143,0.07);border:1px solid rgba(0,214,143,0.15)">
    <span class="text-base">🔒</span>
    <p class="text-xs opacity-60">All orders are paid via UPI and auto-confirmed.</p>
  </div>

  <!-- ORDERS LIST -->
  <main class="px-3 pt-3 pb-24">
    <div id="myOrdersList" class="space-y-4"></div>

    <!-- Empty state -->
    <div id="emptyOrders" class="hidden text-center py-24">
      <p class="text-6xl mb-4">🛍️</p>
      <p class="font-bold mb-1 opacity-60">No orders yet</p>
      <p class="text-sm opacity-40 mb-6">Your orders will appear here after checkout</p>
      <a href="index.html"
         class="inline-block btn-primary px-8 py-3 rounded-2xl text-sm font-bold">
        Start Shopping ⚡
      </a>
    </div>
  </main>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
